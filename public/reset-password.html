<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha - Alimente Fácil</title>
  <meta name="theme-color" content="#00f2ea">
  <style>
    :root {
      --bg: #0b0d12;
      --card: rgba(22, 25, 32, 0.88);
      --border: rgba(255,255,255,.12);
      --text: #fff;
      --muted: rgba(255,255,255,.72);
      --primary: #00f2ea;
      --danger: #ff4d4f;
      --success: #34c759;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(0,242,234,.16), transparent 38%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      width: min(100%, 460px);
      padding: 28px;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 10px; font-size: 1.6rem; }
    p { margin: 0 0 20px; color: var(--muted); line-height: 1.55; }
    .group { display: grid; gap: 8px; margin-bottom: 14px; }
    label { font-size: .95rem; color: var(--text); }
    input {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }
    button {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 0;
      background: var(--primary);
      color: #031416;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    button[disabled] { opacity: .6; cursor: wait; }
    .feedback {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.45;
    }
    .feedback.is-visible { display: block; }
    .feedback.error { background: rgba(255,77,79,.12); border: 1px solid rgba(255,77,79,.34); }
    .feedback.success { background: rgba(52,199,89,.12); border: 1px solid rgba(52,199,89,.34); }
    .back-link { display: inline-block; margin-top: 16px; color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Definir nova senha</h1>
    <p>Informe sua nova senha abaixo e confirme para concluir a redefinição.</p>
    <form id="reset-password-form">
      <div class="group">
        <label for="new-password">Nova senha</label>
        <input type="password" id="new-password" required minlength="6">
      </div>
      <div class="group">
        <label for="confirm-password">Confirmar senha</label>
        <input type="password" id="confirm-password" required minlength="6">
      </div>
      <button type="submit" id="reset-submit-btn">Salvar nova senha</button>
    </form>
    <div id="reset-feedback" class="feedback"></div>
    <a class="back-link" href="/">← Voltar para o Alimente Fácil</a>
  </div>
  <script>
    (function () {
      const form = document.getElementById('reset-password-form');
      const feedback = document.getElementById('reset-feedback');
      const submitBtn = document.getElementById('reset-submit-btn');
      const url = new URL(window.location.href);
      const token = String(url.searchParams.get('token') || '').trim();

      function show(message, kind) {
        feedback.className = 'feedback is-visible ' + (kind || 'error');
        feedback.textContent = message;
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const password = String(document.getElementById('new-password').value || '');
        const confirmPassword = String(document.getElementById('confirm-password').value || '');

        if (!token) {
          show('O link de redefinição é inválido ou está incompleto.', 'error');
          return;
        }
        if (!password || !confirmPassword) {
          show('Preencha os dois campos de senha.', 'error');
          return;
        }
        if (password.length < 6) {
          show('A senha precisa ter pelo menos 6 caracteres.', 'error');
          return;
        }
        if (password !== confirmPassword) {
          show('As senhas não coincidem.', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Salvando...';
        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password, confirmPassword })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data?.message || 'Não foi possível redefinir a senha.');
          }
          show(data?.message || 'Senha redefinida com sucesso. Você já pode fazer login.', 'success');
          form.reset();
        } catch (error) {
          show(error.message || 'Não foi possível redefinir a senha.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Salvar nova senha';
        }
      });
    })();
  </script>
</body>
</html>
