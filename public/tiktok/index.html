<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta http-equiv="refresh" content="0; url=https://www.tiktok.com/@alimentefacil">
  <title>Alimente Fácil | TikTok</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Arial, sans-serif; background: radial-gradient(circle at 50% 0%, rgba(0,242,234,.14), transparent 34%), #060708; color: #fff; }
    main { width: min(100%, 420px); text-align: center; }
    .brand { margin-bottom: 18px; font-size: 12px; letter-spacing: .42em; font-weight: 900; opacity: .86; }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 9vw, 44px); line-height: .96; letter-spacing: -.05em; }
    p { margin: 0 0 22px; color: rgba(255,255,255,.72); line-height: 1.5; }
    a { color: #00f2ea; font-weight: 800; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="brand">ALIMENTE FÁCIL</div>
    <h1>TikTok</h1>
    <p>Você está sendo direcionado para a rede social oficial do Alimente Fácil.</p>
    <a href="https://www.tiktok.com/@alimentefacil" rel="noopener">Abrir agora</a>
  </main>
  <script>window.location.replace("https://www.tiktok.com/@alimentefacil");</script>
</body>
</html>
