<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Alimente Fácil | E-mail</title>
  <meta name="description" content="Envie uma mensagem para a equipe do Alimente Fácil.">
  <link rel="canonical" href="https://www.alimentefacil.com.br/e-mail">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:dark;--cyan:#00f2ea;--gold:#d9b55f;--bg:#060708;--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.13);}
    *{box-sizing:border-box} body{margin:0;min-height:100svh;font-family:Roboto,Arial,sans-serif;background:radial-gradient(circle at 50% 0%,rgba(0,242,234,.12),transparent 34%),linear-gradient(180deg,#090b0f,#050607);color:#fff;display:grid;place-items:center;padding:24px;}
    main{width:min(100%,460px)} .brand{font-family:'Exo 2',Arial,sans-serif;letter-spacing:.42em;font-size:12px;font-weight:900;opacity:.88;margin-bottom:22px;text-align:center}.card{background:var(--card);border:1px solid var(--border);box-shadow:0 24px 70px rgba(0,0,0,.32);padding:24px;border-radius:22px}h1{font-family:'Exo 2',Arial,sans-serif;margin:0 0 8px;font-size:clamp(30px,9vw,48px);line-height:.95;letter-spacing:-.055em}.sub{margin:0 0 22px;color:rgba(255,255,255,.72);line-height:1.5}.field{margin-bottom:12px}label{display:block;font-size:12px;font-weight:800;color:rgba(255,255,255,.72);margin-bottom:6px;letter-spacing:.02em}input,textarea{width:100%;border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.26);color:#fff;border-radius:14px;padding:13px 14px;font:inherit;outline:none}textarea{min-height:130px;resize:vertical}input:focus,textarea:focus{border-color:rgba(0,242,234,.54);box-shadow:0 0 0 3px rgba(0,242,234,.09)}button{width:100%;border:0;border-radius:16px;padding:14px 18px;margin-top:6px;background:linear-gradient(135deg,var(--cyan),#00b8ae);color:#041011;font-weight:900;font-size:16px;cursor:pointer}button:disabled{opacity:.62;cursor:not-allowed}.back{display:block;text-align:center;margin-top:16px;color:rgba(255,255,255,.72);text-decoration:none}.back:hover{color:#fff}.status{min-height:22px;margin-top:12px;font-weight:800;color:var(--gold)}
  </style>
</head>
<body>
  <main>
    <div class="brand">ALIMENTE FÁCIL</div>
    <section class="card" aria-labelledby="email-title">
      <h1 id="email-title">Contato</h1>
      <p class="sub">Envie sua dúvida, sugestão ou solicitação. A equipe do Alimente Fácil responde pelo e-mail informado.</p>
      <form id="email-form">
        <div class="field"><label for="name">Nome</label><input id="name" name="name" autocomplete="name" required></div>
        <div class="field"><label for="email">E-mail</label><input id="email" name="email" type="email" autocomplete="email" required></div>
        <div class="field"><label for="message">Mensagem</label><textarea id="message" name="message" required></textarea></div>
        <button type="submit">Enviar mensagem</button>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </form>
      <a class="back" href="/">Voltar para o site</a>
    </section>
  </main>
  <script>
    const form = document.getElementById('email-form');
    const statusEl = document.getElementById('status');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = form.querySelector('button');
      const payload = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        message: form.message.value.trim()
      };
      if(!payload.name || !payload.email || !payload.message){ statusEl.textContent = 'Preencha todos os campos.'; return; }
      button.disabled = true; statusEl.textContent = 'Enviando...';
      try{
        const response = await fetch('/api/contact', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await response.json().catch(() => ({}));
        if(!response.ok) throw new Error(data.message || 'Não foi possível enviar.');
        statusEl.textContent = data.message || 'Mensagem enviada com sucesso.';
        form.reset();
      }catch(error){ statusEl.textContent = error.message || 'Não foi possível enviar sua mensagem.'; }
      finally{ button.disabled = false; }
    });
  </script>
</body>
</html>
